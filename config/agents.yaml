# Per-agent adapter registry (master §10.3).
#
# Phase 0 SCAFFOLD: no adapter is implemented yet, so the orchestrator runs an
# empty registry regardless of these flags. install.sh auto-detects which agent
# data dirs exist on this machine and flips `enabled: true` for the ones present;
# the rest stay false and render a "not detected" empty state (never an error).
#
# `cost` drives the hybrid USD policy (master §11.5 + ADR-0002):
#   native  -> show the vendor's exact USD                (Claude Code, Pi)
#   none    -> tokens-only; rack-rate estimate still computed, never fabricated
# `tokens: protobuf_db` tells the Antigravity adapter to decode token usage from
# the conversation .db protobuf (§10.2) rather than the JSONL transcript.

agents:
  claude_code:
    name: "Claude Code"
    order: 1
    enabled: true
    path: "~/.claude/projects"
    glob: "*/*.jsonl"
    otel: true
    otel_service: "claude-code"
    cost: native

  codex:
    name: "Codex"
    order: 2
    enabled: true
    path: "~/.codex/sessions"
    glob: "**/*.jsonl"
    otel: false # built-in but opt-in; wizard enables in Phase 2
    otel_service: "codex"
    cost: none

  pi:
    name: "Pi"
    order: 3
    enabled: true
    path: "~/.pi/agent/sessions"
    glob: "**/*.jsonl"
    otel: false # plugin (pi-otel); enabled in Phase 3
    otel_service: "pi-otel"
    cost: native

  antigravity:
    name: "Antigravity"
    order: 4
    enabled: true
    path: "~/.gemini/antigravity-cli"
    # Session index = the conversation .db (basename = conv-id = session_id, and the
    # token source). Tools are resolved from the sibling transcript
    # brain/<conv-id>/.system_generated/logs/transcript_full.jsonl.
    glob: "conversations/*.db"
    otel: false # no usable local OTLP — do NOT enable the Google toggle
    otel_service: "antigravity"
    cost: none
    tokens: protobuf_db
