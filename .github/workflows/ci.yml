# CI: typecheck + unit tests + svelte-check. The review (#16) noted these all
# pass locally but nothing ran them — this closes that gap. Harmless if the repo
# is never pushed to GitHub; runs `bun run check` exactly as a developer would.
name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install root deps
        run: bun install --frozen-lockfile || bun install
      - name: Install UI deps
        run: cd ui && (bun install --frozen-lockfile || bun install)
      - name: Typecheck + test + svelte-check
        run: bun run check

  # Separate job: the Rust bridge is deliberately OFF the fast `check` job (cold
  # cargo builds add minutes), but it must still compile + pass its tests — a
  # broken or out-of-date bridge otherwise ships green and surfaces only as a
  # runtime `unknown_command`. Builds the exact binary the dashboard invokes.
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build the prompt-library bridge
        run: cargo build -p prompt-library-bridge
      - name: Test the Rust workspace
        run: cargo test --workspace
